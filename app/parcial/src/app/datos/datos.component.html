<ion-card>
  <ion-card-header>
    <ion-card-title>Datos del Cliente</ion-card-title>
  </ion-card-header>
  <ion-card-content>

    <ion-item>
      <ion-label position="floating">Cédula</ion-label>
      <ion-input [(ngModel)]="nuevoCliente.cedula"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Nombre</ion-label>
      <ion-input [(ngModel)]="nuevoCliente.nombre"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Contacto</ion-label>
      <ion-input [(ngModel)]="nuevoCliente.contacto"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Email</ion-label>
      <ion-input type="email" [(ngModel)]="nuevoCliente.email"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Teléfono</ion-label>
      <ion-input type="tel" [(ngModel)]="nuevoCliente.telefono"></ion-input>
    </ion-item>

    <ion-button expand="full" (click)="guardarCliente()">Guardar Cliente</ion-button>

  </ion-card-content>
</ion-card>

<ion-list>
  <ion-list-header>Clientes Registrados</ion-list-header>
  <ion-item *ngFor="let cliente of clientes">
    <ion-label>
      <h2>{{ cliente.nombre }} (Cédula: {{ cliente.cedula }})</h2>
      <p>Contacto: {{ cliente.contacto }}</p>
      <p>Email: {{ cliente.email }}</p>
      <p>Teléfono: {{ cliente.telefono }}</p>
    </ion-label>
  </ion-item>
</ion-list>
